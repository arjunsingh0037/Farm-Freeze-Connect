<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmFreeze - My Bookings</title>
    <link rel="stylesheet" href="../css/styles-common.css">
    <style>
        /* Bookings-specific styles */
        .bookings-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.2);
        }

        .bookings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .bookings-header h2 {
            color: var(--primary);
            font-size: 32px;
        }

        /* Bookings List */
        .bookings-list {
            display: grid;
            gap: 20px;
        }

        .booking-card {
            border: 2px solid var(--gray-200);
            background: white;
            padding: 25px;
            border-radius: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .booking-card:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
            transform: translateY(-3px);
        }

        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .booking-ref {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            background: #d1fae5;
            color: #065f46;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .bookings-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .bookings-header h2 {
                font-size: 26px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stat-value {
                font-size: 28px;
            }
            
            .stat-label {
                font-size: 12px;
            }
            
            .booking-card {
                padding: 20px;
            }
            
            .booking-ref {
                font-size: 18px;
            }
        }
        
        @media (max-width: 480px) {
            .bookings-card {
                padding: 20px;
                border-radius: 16px;
            }
            
            .bookings-header h2 {
                font-size: 22px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .stat-card {
                padding: 20px;
            }
            
            .booking-card {
                padding: 15px;
            }
            
            .booking-ref {
                font-size: 16px;
            }
            
            .status-badge {
                font-size: 11px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">
                <span class="brand-icon">❄️</span>
                <span>FarmFreeze</span>
            </a>
            <div class="navbar-menu">
                <a href="/" class="nav-link">🎤 Voice Booking</a>
                <a href="/bookings" class="nav-link active">📋 My Bookings</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Header -->
        <div style="text-align: center; color: white; margin-bottom: 40px;">
            <h1 style="font-size: 48px; font-weight: 700; margin-bottom: 10px;">My Bookings</h1>
            <p style="font-size: 20px; opacity: 0.95;">View and manage your cold storage bookings</p>
        </div>

        <!-- Bookings Card -->
        <div class="bookings-card">
            <div class="bookings-header">
                <h2>📋 All Bookings</h2>
                <button id="refreshBtn" class="btn btn-primary">
                    <span>🔄</span>
                    <span>Refresh</span>
                </button>
            </div>

            <!-- Stats -->
            <div id="statsGrid" class="stats-grid" style="display: none;"></div>

            <!-- Bookings List -->
            <div id="bookingsList" class="bookings-list"></div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading bookings...</div>
    </div>

    <script>
        const API_URL = 'http://localhost:8001/api/v1';

        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        // Load Bookings
        async function loadBookings() {
            showLoading();
            try {
                const res = await fetch(`${API_URL}/bookings`);
                if (!res.ok) throw new Error('Failed to load bookings');
                
                const bookings = await res.json();
                displayBookings(bookings);
            } catch (err) {
                console.error('Error:', err);
                alert('❌ Error loading bookings: ' + err.message);
            } finally {
                hideLoading();
            }
        }

        // Display Bookings
        function displayBookings(bookings) {
            const list = document.getElementById('bookingsList');
            const statsGrid = document.getElementById('statsGrid');

            if (!bookings || bookings.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>No Bookings Yet</h3>
                        <p>You haven't made any bookings. Start by recording your storage requirements!</p>
                        <a href="/" class="btn btn-secondary">
                            <span>🎤</span>
                            <span>Make a Booking</span>
                        </a>
                    </div>
                `;
                statsGrid.style.display = 'none';
                return;
            }

            // Calculate stats
            const totalBookings = bookings.length;
            const totalQuantity = bookings.reduce((sum, b) => sum + parseFloat(b.quantity_kg || 0), 0);
            const totalCost = bookings.reduce((sum, b) => sum + parseFloat(b.total_cost || 0), 0);
            const confirmedBookings = bookings.filter(b => b.status === 'confirmed').length;

            // Display stats
            statsGrid.style.display = 'grid';
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalBookings}</div>
                    <div class="stat-label">Total Bookings</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalQuantity >= 1000 ? (totalQuantity / 1000).toFixed(1) + 'T' : totalQuantity.toFixed(0) + ' kg'}</div>
                    <div class="stat-label">Total Quantity</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">₹${totalCost.toFixed(0)}</div>
                    <div class="stat-label">Total Cost</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${confirmedBookings}</div>
                    <div class="stat-label">Confirmed</div>
                </div>
            `;

            // Display bookings
            list.innerHTML = bookings.map(b => `
                <div class="booking-card">
                    <div class="booking-header">
                        <div class="booking-ref">📋 ${b.booking_reference}</div>
                        <div class="status-badge">${b.status}</div>
                    </div>
                    <div style="background: #f9fafb; padding: 20px; border-radius: 12px; margin: 15px 0;">
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px;">
                            <div>
                                <div style="font-size: 12px; color: #6b7280; text-transform: uppercase; font-weight: 600; margin-bottom: 5px;">🏪 Storage Facility</div>
                                <div style="font-size: 16px; font-weight: 600; color: #111827;">${b.cold_storage_name}</div>
                            </div>
                            <div>
                                <div style="font-size: 12px; color: #6b7280; text-transform: uppercase; font-weight: 600; margin-bottom: 5px;">🌾 Crop Type</div>
                                <div style="font-size: 16px; font-weight: 600; color: #111827;">${b.crop_type || 'Not specified'}</div>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
                            <div style="text-align: center; padding: 12px; background: white; border-radius: 8px;">
                                <div style="font-size: 11px; color: #6b7280; text-transform: uppercase; margin-bottom: 5px;">Quantity</div>
                                <div style="font-size: 18px; font-weight: 700; color: #667eea;">${b.quantity_kg} kg</div>
                            </div>
                            <div style="text-align: center; padding: 12px; background: white; border-radius: 8px;">
                                <div style="font-size: 11px; color: #6b7280; text-transform: uppercase; margin-bottom: 5px;">Date</div>
                                <div style="font-size: 18px; font-weight: 700; color: #667eea;">${new Date(b.booking_date).toLocaleDateString('en-GB', {day: '2-digit', month: 'short'})}</div>
                            </div>
                            <div style="text-align: center; padding: 12px; background: white; border-radius: 8px;">
                                <div style="font-size: 11px; color: #6b7280; text-transform: uppercase; margin-bottom: 5px;">Duration</div>
                                <div style="font-size: 18px; font-weight: 700; color: #667eea;">${b.duration_days} days</div>
                            </div>
                            <div style="text-align: center; padding: 12px; background: white; border-radius: 8px;">
                                <div style="font-size: 11px; color: #6b7280; text-transform: uppercase; margin-bottom: 5px;">Cost</div>
                                <div style="font-size: 18px; font-weight: 700; color: #10b981;">₹${b.total_cost.toFixed(2)}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Refresh button
        document.getElementById('refreshBtn').addEventListener('click', loadBookings);

        // Load bookings on page load
        loadBookings();

        console.log('✅ FarmFreeze Bookings Page Ready');
    </script>
</body>
</html>
