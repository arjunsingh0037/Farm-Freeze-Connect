<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmFreeze - Voice Booking</title>
    <link rel="stylesheet" href="/css/styles-common.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">
                <span class="brand-icon">❄️</span>
                <span>FarmFreeze</span>
            </a>
            <div class="navbar-menu">
                <a href="/" class="nav-link active">🎤 Voice Booking</a>
                <a href="/bookings" class="nav-link">📋 My Bookings</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Hero Section -->
        <div style="text-align: center; color: white; margin-bottom: 40px;">
            <h1 style="font-size: 48px; font-weight: 700; margin-bottom: 10px;">Voice Booking</h1>
            <p style="font-size: 20px; opacity: 0.95;">Speak your storage requirements in Hindi or English</p>
        </div>

        <!-- Voice Recording Card -->
        <div class="card" style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: var(--primary); font-size: 28px; margin-bottom: 10px;">🎤 Record Your Requirements</h2>
            <p style="color: #666; font-size: 16px; margin-bottom: 30px;">Click the button and speak clearly</p>
            
            <button id="recordBtn" style="width: 180px; height: 180px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; font-size: 70px; cursor: pointer; margin: 0 auto 20px; display: block; box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4); transition: all 0.3s;">🎙️</button>
            
            <div id="recordingStatus" style="display: none; font-size: 20px; color: #ef4444; font-weight: 600; justify-content: center; align-items: center; gap: 12px; margin-bottom: 20px;">
                <span style="width: 14px; height: 14px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite;"></span>
                <span>Recording... <span id="timer">0s</span></span>
            </div>

            <div style="display: flex; align-items: center; gap: 20px; margin: 30px 0; color: #999;">
                <div style="flex: 1; height: 1px; background: #ddd;"></div>
                <span>OR</span>
                <div style="flex: 1; height: 1px; background: #ddd;"></div>
            </div>

            <input type="file" id="audioFile" accept="audio/*" style="display: none;" />
            <button onclick="document.getElementById('audioFile').click()" class="btn btn-secondary" style="padding: 16px 40px; font-size: 16px;">
                📁 Upload Audio File
            </button>
        </div>

        <!-- Location Card -->
        <div class="card" style="margin-bottom: 30px;">
            <h3 style="color: var(--primary); font-size: 22px; margin-bottom: 20px;">📍 Your Location</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; align-items: end;">
                <input type="number" id="lat" placeholder="Latitude" step="0.0001" value="12.9716" style="padding: 14px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 16px;" />
                <input type="number" id="lng" placeholder="Longitude" step="0.0001" value="77.5946" style="padding: 14px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 16px;" />
                <button id="detectBtn" class="btn btn-primary">📍 Detect</button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" style="display: none;">
            <div class="card">
                <h2 style="color: var(--primary); font-size: 28px; margin-bottom: 25px;">📊 Results</h2>
                <div id="contentBox"></div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Processing...</div>
    </div>


    <style>
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.5; }
        }
        
        #recordBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.6);
        }
        
        #recordBtn.recording {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            animation: pulse 1.5s infinite;
        }
        
        @media (max-width: 768px) {
            #recordBtn {
                width: 140px;
                height: 140px;
                font-size: 50px;
            }
            
            h1 {
                font-size: 36px !important;
            }
            
            h2 {
                font-size: 22px !important;
            }
            
            h3 {
                font-size: 20px !important;
            }
            
            .card {
                padding: 25px 20px;
            }
        }
        
        @media (max-width: 480px) {
            #recordBtn {
                width: 120px;
                height: 120px;
                font-size: 40px;
            }
            
            h1 {
                font-size: 28px !important;
            }
            
            p {
                font-size: 16px !important;
            }
            
            h2 {
                font-size: 20px !important;
            }
            
            h3 {
                font-size: 18px !important;
            }
            
            .card {
                padding: 20px 15px;
            }
            
            #lat, #lng {
                font-size: 14px !important;
                padding: 12px !important;
            }
            
            .btn {
                padding: 12px 20px !important;
                font-size: 14px !important;
            }
        }
    </style>

    <script>
       const API_URL = (window.location.origin || '') + '/api/v1';
        let mediaRecorder, audioChunks = [], recordingTimer, seconds = 0;
        const INVALID_CROPS = ['it', 'this', 'that', 'something', 'anything', 'storage', 'cold'];

        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        // Location Detection
        document.getElementById('detectBtn').addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert('❌ Geolocation not supported');
                return;
            }
            
            showLoading();
            navigator.geolocation.getCurrentPosition(
                pos => {
                    document.getElementById('lat').value = pos.coords.latitude.toFixed(4);
                    document.getElementById('lng').value = pos.coords.longitude.toFixed(4);
                    hideLoading();
                    alert('✅ Location detected!');
                },
                err => {
                    hideLoading();
                    alert('❌ Could not detect location');
                }
            );
        });

        // Voice Recording
        document.getElementById('recordBtn').addEventListener('click', async () => {
            const btn = document.getElementById('recordBtn');
            const status = document.getElementById('recordingStatus');
            
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                seconds = 0;

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                
                mediaRecorder.onstop = async () => {
                    clearInterval(recordingTimer);
                    const blob = new Blob(audioChunks, { type: 'audio/wav' });
                    await processVoice(blob);
                    
                    btn.textContent = '🎙️';
                    btn.classList.remove('recording');
                    status.style.display = 'none';
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                btn.textContent = '⏹️';
                btn.classList.add('recording');
                status.style.display = 'flex';
                
                recordingTimer = setInterval(() => {
                    seconds++;
                    document.getElementById('timer').textContent = seconds + 's';
                }, 1000);
            } catch (err) {
                alert('❌ Microphone access denied');
            }
        });

        // Audio File Upload
        document.getElementById('audioFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                await processVoice(file);
                e.target.value = '';
            }
        });

        // Process Voice
        async function processVoice(audioBlob) {
            showLoading();
            const formData = new FormData();
            formData.append('audio_file', audioBlob, 'recording.wav');
            formData.append('farmer_name', 'Web User');
            formData.append('farmer_phone', '+919999999999');
            formData.append('farmer_lat', document.getElementById('lat').value);
            formData.append('farmer_lng', document.getElementById('lng').value);
            formData.append('language_code', 'hi-IN');

            try {
                const res = await fetch(`${API_URL}/voice/book`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!res.ok) {
                    const errorData = await res.json().catch(() => ({}));
                    throw new Error(errorData.detail || 'Voice processing failed');
                }
                
                const data = await res.json();
                displayResults(data);
            } catch (err) {
                console.error('Error:', err);
                alert('❌ Error: ' + err.message);
            } finally {
                hideLoading();
            }
        }

        // Display Results
        function displayResults(data) {
            const section = document.getElementById('resultsSection');
            const contentBox = document.getElementById('contentBox');
            
            const intent = data.intent || {};
            const missingInfo = [];
            
            const crop = (intent.crop || '').toLowerCase().trim();
            if (!crop || INVALID_CROPS.includes(crop) || crop.length < 3) {
                missingInfo.push('Crop type (e.g., tomato, potato, onion)');
            }
            
            if (!intent.quantity || intent.quantity === 0) {
                missingInfo.push('Quantity (e.g., 100 kg, 2 tons)');
            }
            
            if (missingInfo.length > 0) {
                section.style.display = 'block';
                contentBox.innerHTML = `
                    <div style="background: #fee; padding: 30px; border-radius: 16px; border: 2px solid #ef4444;">
                        <h3 style="color: #ef4444; margin-bottom: 15px; font-size: 24px;">⚠️ Missing Information</h3>
                        <p style="color: #666; margin-bottom: 15px;">We couldn't understand:</p>
                        <ul style="list-style: none; padding: 0; margin: 20px 0;">
                            ${missingInfo.map(info => `<li style="color: #dc2626; font-size: 18px; font-weight: 600; margin: 12px 0;">❌ ${info}</li>`).join('')}
                        </ul>
                        <div style="color: #666; margin-top: 20px; line-height: 1.6;">
                            <strong>Please record again and clearly mention:</strong><br>
                            • What crop (tomatoes, potatoes, onions)<br>
                            • How much quantity (100 kg, 2 tons)<br>
                            • Duration if needed (5 days, 2 weeks)
                        </div>
                        <div style="color: #667eea; margin-top: 15px; padding: 15px; background: #f8f9ff; border-radius: 8px; font-style: italic;">
                            <strong>Example:</strong> "I need to store 100 kg tomatoes for 5 days from tomorrow"
                        </div>
                    </div>
                `;
                section.scrollIntoView({ behavior: 'smooth' });
                return;
            }
            
            section.style.display = 'block';
            const storages = data.available_storages || [];
            
            contentBox.innerHTML = `
                <div style="background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%); padding: 30px; border-radius: 16px; margin-bottom: 30px; border: 2px solid #e0e7ff;">
                    <h3 style="color: #667eea; margin-bottom: 20px; font-size: 24px;">🎯 What We Understood</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px;">
                        ${intent.crop ? `<div style="text-align: center; padding: 15px; background: white; border-radius: 12px;"><div style="font-size: 12px; color: #6b7280; text-transform: uppercase; font-weight: 600; margin-bottom: 8px;">Crop</div><div style="font-size: 22px; color: #111827; font-weight: 700;">${intent.crop}</div></div>` : ''}
                        ${intent.quantity ? `<div style="text-align: center; padding: 15px; background: white; border-radius: 12px;"><div style="font-size: 12px; color: #6b7280; text-transform: uppercase; font-weight: 600; margin-bottom: 8px;">Quantity</div><div style="font-size: 22px; color: #111827; font-weight: 700;">${intent.quantity} ${intent.unit || 'kg'}</div></div>` : ''}
                        ${intent.duration_days ? `<div style="text-align: center; padding: 15px; background: white; border-radius: 12px;"><div style="font-size: 12px; color: #6b7280; text-transform: uppercase; font-weight: 600; margin-bottom: 8px;">Duration</div><div style="font-size: 22px; color: #111827; font-weight: 700;">${intent.duration_days} days</div></div>` : ''}
                        ${intent.time ? `<div style="text-align: center; padding: 15px; background: white; border-radius: 12px;"><div style="font-size: 12px; color: #6b7280; text-transform: uppercase; font-weight: 600; margin-bottom: 8px;">Start</div><div style="font-size: 22px; color: #111827; font-weight: 700;">${intent.time}</div></div>` : ''}
                    </div>
                </div>
                
                <h3 style="color: #667eea; font-size: 24px; margin-bottom: 20px;">🏪 Available Storage Facilities</h3>
                <div style="display: grid; gap: 25px;">
                    ${storages.length === 0 ? '<p style="text-align:center;color:#666;padding:40px;">No storage facilities found</p>' :
                        storages.map(s => `
                            <div style="border: 2px solid #e5e7eb; border-radius: 20px; padding: 30px; transition: all 0.3s;">
                                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                                    <div>
                                        <div style="font-size: 26px; font-weight: 700; color: #111827; margin-bottom: 10px;">${s.storage_name}</div>
                                        <div style="color: #6b7280; font-size: 16px;">📍 ${s.address}</div>
                                    </div>
                                    <div style="background: #667eea; color: white; padding: 10px 20px; border-radius: 25px; font-weight: 700; font-size: 16px;">${s.distance_km} km</div>
                                </div>
                                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin: 25px 0; padding: 25px; background: #f9fafb; border-radius: 16px;">
                                    <div style="text-align: center;"><div style="font-size: 12px; color: #6b7280; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Price/kg/day</div><div style="font-size: 24px; font-weight: 700; color: #111827;">₹${s.price_per_kg_per_day}</div></div>
                                    <div style="text-align: center;"><div style="font-size: 12px; color: #6b7280; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Total Cost</div><div style="font-size: 24px; font-weight: 700; color: #111827;">₹${s.total_cost.toFixed(2)}</div></div>
                                    <div style="text-align: center;"><div style="font-size: 12px; color: #6b7280; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Capacity</div><div style="font-size: 24px; font-weight: 700; color: #111827;">${(s.available_capacity_kg/1000).toFixed(1)}T</div></div>
                                </div>
                                <button class="btn btn-success" onclick="bookStorage(${s.storage_id}, ${intent.quantity || 0}, '${intent.crop || ''}', ${intent.duration_days || 7})" style="width: 100%; justify-content: center; padding: 16px 32px; font-size: 18px;">
                                    ✅ Book This Storage
                                </button>
                            </div>
                        `).join('')
                    }
                </div>
            `;
            
            section.scrollIntoView({ behavior: 'smooth' });
        }

        // Book Storage
        window.bookStorage = async function(storageId, quantity, crop, duration) {
            if (!confirm('Confirm booking?')) return;

            showLoading();
            try {
                const res = await fetch(`${API_URL}/bookings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        farmer_name: 'Web User',
                        farmer_phone: '+919999999999',
                        cold_storage_id: storageId,
                        quantity_kg: quantity,
                        booking_date: new Date().toISOString().split('T')[0],
                        duration_days: duration,
                        crop_type: crop
                    })
                });

                if (!res.ok) throw new Error('Booking failed');
                const data = await res.json();
                alert(`✅ Booking Confirmed!\\n\\nReference: ${data.booking_reference}\\nStorage: ${data.cold_storage_name}\\nCost: ₹${data.total_cost.toFixed(2)}`);
                window.location.href = '/bookings';
            } catch (err) {
                alert('❌ Error: ' + err.message);
            } finally {
                hideLoading();
            }
        };

        console.log('✅ FarmFreeze Voice Booking Ready');
    </script>
</body>
</html>
